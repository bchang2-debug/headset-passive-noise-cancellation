<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Headphone Passive Noise Cancellation Comparison Tool</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 1000px; margin: 0 auto; background-color: #f9f9f9; }
        .controls { display: flex; gap: 15px; margin-bottom: 20px; background: #fff; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .select-group { display: flex; flex-direction: column; flex: 1; }
        label { font-weight: bold; margin-bottom: 5px; color: #333; }
        select { padding: 8px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; background-color: #fff; }
        
        /* Chart container styles */
        .chart-section { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .chart-title { font-size: 18px; font-weight: bold; margin-bottom: 10px; padding-left: 8px; border-left: 4px solid #333; }
        .chart-title.left-side { border-left-color: #2196F3; color: #1565C0; }
        .chart-title.right-side { border-left-color: #E91E63; color: #C2185B; }
    </style>
</head>
<body>

    <h2>PASSIVE NOISE CANCELLATION</h2>
    
    <div class="controls">
        <div class="select-group">
            <label for="headphoneA">Select Headphone A (Blue Line):</label>
            <select id="headphoneA">
                <option value="bose" selected>Bose QC Comfort</option>
                <option value="sony">SONY WH-1000XM5</option>
                <option value="dell">Dell WL7024</option>
                <option value="mario">Mario PB1 FW22</option>
                <option value="poly">POLY SURROUND 80</option>
            </select>
        </div>
        <div class="select-group">
            <label for="headphoneB">Select Headphone B (Red Line):</label>
            <select id="headphoneB">
                <option value="bose">Bose QC Comfort</option>
                <option value="sony" selected>SONY WH-1000XM5</option>
                <option value="dell">Dell WL7024</option>
                <option value="mario">Mario PB1 FW22</option>
                <option value="poly">POLY SURROUND 80</option>
            </select>
        </div>
        <div class="select-group">
            <label for="headphoneC">Select Headphone C (Green Line):</label>
            <select id="headphoneC">
                <option value="bose">Bose QC Comfort</option>
                <option value="sony">SONY WH-1000XM5</option>
                <option value="dell" selected>Dell WL7024</option>
                <option value="mario">Mario PB1 FW22</option>
                <option value="poly">POLY SURROUND 80</option>
            </select>
        </div>
    </div>

    <div class="chart-section">
        <div class="chart-title left-side">Left Channel - Passive Noise Cancellation</div>
        <canvas id="leftChart"></canvas>
    </div>

    <div class="chart-section">
        <div class="chart-title right-side">Right Channel - Passive Noise Cancellation</div>
        <canvas id="rightChart"></canvas>
    </div>

    <script>
        // X-axis Frequency points
        const frequencies = ['20', '50', '100', '200', '500', '1k', '2k', '5k', '10k', '20k'];
        
        // Database: Real measurement data from uploaded text files
        const headphoneData = {
            'bose': { 
                name: 'Bose QC Comfort', 
                left: [-2.67, 2.75, 3.92, -4.48, -11.71, -21.57, -25.20, -41.82, -34.43, -35.16], 
                right: [-2.10, 7.77, 2.68, -4.41, -14.15, -20.24, -21.91, -47.24, -37.94, -39.91] 
            },
            'sony': { 
                name: 'SONY WH-1000XM5', 
                left: [-0.72, -0.81, 1.72, -1.79, -25.55, -32.13, -30.75, -46.68, -42.15, -37.06], 
                right: [-0.64, 2.47, 2.90, -3.88, -22.69, -30.84, -26.73, -44.91, -42.36, -39.26] 
            },
            'dell': { 
                name: 'Dell WL7024', 
                left: [1.49, 4.20, 1.95, 2.76, -7.29, -15.01, -29.78, -38.54, -31.59, -32.47], 
                right: [-0.88, 7.87, 0.77, -0.23, -7.13, -11.58, -25.34, -36.06, -37.26, -39.08] 
            },
            'mario': { 
                name: 'Mario PB1 FW22', 
                left: [-3.50, 1.75, -1.03, -6.96, -9.42, -17.90, -28.17, -45.71, -42.20, -34.13], 
                right: [-2.85, 2.23, -0.94, -5.40, -15.97, -16.06, -29.70, -44.49, -42.85, -37.69] 
            },
            'poly': { 
                name: 'POLY SURROUND 80', 
                left: [-2.71, 0.30, -1.10, -5.98, -6.26, -19.22, -22.90, -32.14, -36.43, -36.45], 
                right: [-2.71, 0.30, -1.10, -5.98, -6.26, -19.22, -22.90, -32.14, -36.43, -36.45] 
            }
        };

        const selectA = document.getElementById('headphoneA');
        const selectB = document.getElementById('headphoneB');
        const selectC = document.getElementById('headphoneC');

        // Common Chart options template
        const commonOptions = {
            responsive: true,
            elements: {
                point: { radius: 0, hitRadius: 10, hoverRadius: 5 }
            },
            interaction: { mode: 'index', intersect: false },
            scales: {
                x: { title: { display: true, text: 'Frequency (Hz)' } },
                y: { title: { display: true, text: 'Response (dB)' }, min: -50, max: 15 }
            },
            plugins: {
                tooltip: {
                    callbacks: {
                        label: function(context) { return context.dataset.label + ': ' + context.parsed.y + ' dB'; }
                    }
                }
            }
        };

        // --- 1. Initialize Left Channel Chart ---
        const ctxLeft = document.getElementById('leftChart').getContext('2d');
        let leftChart = new Chart(ctxLeft, {
            type: 'line',
            data: {
                labels: frequencies,
                datasets: [
                    { label: headphoneData[selectA.value].name, data: headphoneData[selectA.value].left, borderColor: '#2196F3', backgroundColor: 'rgba(33, 150, 243, 0.05)', borderWidth: 2, tension: 0.4, fill: true },
                    { label: headphoneData[selectB.value].name, data: headphoneData[selectB.value].left, borderColor: '#F44336', backgroundColor: 'rgba(244, 67, 54, 0.05)', borderWidth: 2, tension: 0.4, fill: true },
                    { label: headphoneData[selectC.value].name, data: headphoneData[selectC.value].left, borderColor: '#4CAF50', backgroundColor: 'rgba(76, 175, 80, 0.05)', borderWidth: 2, tension: 0.4, fill: true }
                ]
            },
            options: commonOptions
        });

        // --- 2. Initialize Right Channel Chart ---
        const ctxRight = document.getElementById('rightChart').getContext('2d');
        let rightChart = new Chart(ctxRight, {
            type: 'line',
            data: {
                labels: frequencies,
                datasets: [
                    { label: headphoneData[selectA.value].name, data: headphoneData[selectA.value].right, borderColor: '#2196F3', backgroundColor: 'rgba(33, 150, 243, 0.05)', borderWidth: 2, tension: 0.4, fill: true },
                    { label: headphoneData[selectB.value].name, data: headphoneData[selectB.value].right, borderColor: '#F44336', backgroundColor: 'rgba(244, 67, 54, 0.05)', borderWidth: 2, tension: 0.4, fill: true },
                    { label: headphoneData[selectC.value].name, data: headphoneData[selectC.value].right, borderColor: '#4CAF50', backgroundColor: 'rgba(76, 175, 80, 0.05)', borderWidth: 2, tension: 0.4, fill: true }
                ]
            },
            options: commonOptions
        });

        // --- 3. Function to synchronize and update both charts ---
        function updateAllCharts() {
            const valA = selectA.value;
            const valB = selectB.value;
            const valC = selectC.value;

            // Update Left Channel Data
            leftChart.data.datasets[0].label = headphoneData[valA].name;
            leftChart.data.datasets[0].data = headphoneData[valA].left;
            leftChart.data.datasets[1].label = headphoneData[valB].name;
            leftChart.data.datasets[1].data = headphoneData[valB].left;
            leftChart.data.datasets[2].label = headphoneData[valC].name;
            leftChart.data.datasets[2].data = headphoneData[valC].left;
            leftChart.update();

            // Update Right Channel Data
            rightChart.data.datasets[0].label = headphoneData[valA].name;
            rightChart.data.datasets[0].data = headphoneData[valA].right;
            rightChart.data.datasets[1].label = headphoneData[valB].name;
            rightChart.data.datasets[1].data = headphoneData[valB].right;
            rightChart.data.datasets[2].label = headphoneData[valC].name;
            rightChart.data.datasets[2].data = headphoneData[valC].right;
            rightChart.update();
        }

        // --- 4. Bind Event Listeners to Dropdowns ---
        selectA.addEventListener('change', updateAllCharts);
        selectB.addEventListener('change', updateAllCharts);
        selectC.addEventListener('change', updateAllCharts);
    </script>

</body>
</html>
